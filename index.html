<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פורים שמח! מרועי כרמלי</title>
    
    <meta property="og:title" content="פורים שמח! מרועי כרמלי">
    <meta property="og:description" content="לחצו על הקישור לפתיחת האיגרת">
    <meta property="og:type" content="website">
    <meta property="og:image" content="1.png">

    <style>
        :root {
            --book-width-mobile: 80vw;
            --book-width-desktop: 400px;
            --transition-time: 1.2s;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fcfcfc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .book-wrapper {
            position: relative;
            width: var(--book-width-mobile);
            max-width: var(--book-width-desktop);
            aspect-ratio: 934 / 1114;
            transition: transform var(--transition-time) ease;
            transform-origin: right center;
            will-change: transform;
        }

        @media (min-width: 800px) {
            .book-wrapper.is-open {
                transform: translateX(-50%);
            }
        }

        @media (max-width: 799px) {
            .book-wrapper.is-open {
                transform: translateX(-50%) scale(0.55);
            }
        }

        .book-container {
            position: absolute;
            width: 100%;
            height: 100%;
            perspective: 2000px;
            -webkit-perspective: 2000px;
        }

        .book-inside {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            background-color: white;
        }
        
        .book-inside img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-cover {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            transform-origin: right center;
            transition: transform var(--transition-time) cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .book-cover.is-open {
            transform: rotateY(180deg);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        .cover-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 4px;
            overflow: hidden;
        }

        .cover-front {
            background-color: white;
        }

        .cover-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-back {
            background-color: #f9f9f9;
            transform: rotateY(180deg);
            background-image: linear-gradient(to right, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 10%);
        }
        
        .hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            transition: opacity 0.3s;
        }

        .book-wrapper.is-open .hint {
            opacity: 0;
            pointer-events: none;
        }

        /* קונטיינר לכפתורי השיתוף */
        .share-buttons-container {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            transition: bottom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .share-buttons-container.show {
            bottom: 40px;
        }

        /* עיצוב אחיד לכפתורים */
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s, transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* צבעים ספציפיים */
        .btn-whatsapp {
            background-color: #25D366;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        .btn-general {
            background-color: #333333;
            box-shadow: 0 4px 15px rgba(51, 51, 51, 0.4);
        }
    </style>
</head>
<body>

    <div class="book-wrapper" id="bookWrapper">
        <div class="book-container">
            <div class="book-inside">
                <img src="2.png" alt="תוכן הברכה">
            </div>

            <div class="book-cover" id="coverPage" onclick="toggleBook()">
                <div class="cover-face cover-front">
                    <img src="1.png" alt="חזית הברכה">
                </div>
                <div class="cover-face cover-back"></div>
            </div>
        </div>
        <div class="hint">לחצו על הכריכה כדי לפתוח את האיגרת</div>
    </div>

    <div class="share-buttons-container" id="shareButtons">
        <button class="action-btn btn-whatsapp" onclick="shareOnWhatsApp()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            וואטסאפ
        </button>

        <button class="action-btn btn-general" onclick="shareNative()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
            </svg>
            עוד אפשרויות
        </button>
    </div>

    <script>
        function toggleBook() {
            const cover = document.getElementById('coverPage');
            const wrapper = document.getElementById('bookWrapper');
            const shareContainer = document.getElementById('shareButtons');
            
            cover.classList.toggle('is-open');
            wrapper.classList.toggle('is-open');
            shareContainer.classList.toggle('show');
        }

        function shareOnWhatsApp() {
            const currentUrl = window.location.href;
            const message = "פורים שמח ממשפחת כרמלי! 🎉\nלחצו כאן כדי לפתוח את האיגרת שלנו:\n" + currentUrl;
            const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        async function shareNative() {
            const currentUrl = window.location.href;
            const shareData = {
                title: 'פורים שמח! משפחת כרמלי',
                text: 'פורים שמח ממשפחת כרמלי! 🎉 לחצו כאן כדי לפתוח את האיגרת שלנו:',
                url: currentUrl
            };

            // בדיקה האם הדפדפן תומך ב-API השיתוף המובנה
            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('השיתוף בוטל או נכשל:', err);
                }
            } else {
                // Fallback: העתקת הקישור ללוח במקרה שאין תמיכה (למשל בדפדפני דסקטופ ישנים)
                navigator.clipboard.writeText(currentUrl).then(() => {
                    alert('הקישור הועתק ללוח! כעת תוכלו להדביק אותו היכן שתרצו.');
                }).catch(err => {
                    console.error('שגיאה בהעתקת הקישור:', err);
                });
            }
        }
    </script>

</body>
</html>
